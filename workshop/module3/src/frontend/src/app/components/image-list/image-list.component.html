<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Images</h2>
    <a routerLink="/images/upload" class="btn btn-primary">Upload Image</a>
  </div>
  <div class="row g-3">
    <div class="col-sm-6 col-md-4 col-lg-3" *ngFor="let image of images">
      <div class="card h-100">
        <a [routerLink]="['/images', image.key]">
          <img
            [src]="image.thumbnailUrl || image.url"
            class="card-img-top"
            [alt]="image.key"
            style="object-fit: cover; height: 160px;"
          />
        </a>
        <div class="card-body p-2">
          <p class="card-text text-truncate small" [title]="image.key">{{ image.key }}</p>
          <button class="btn btn-sm btn-danger w-100" (click)="deleteImage(image.key)">Delete</button>
        </div>
      </div>
    </div>
    <div *ngIf="images.length === 0" class="col-12">
      <p class="text-muted">No images found. Upload one to get started.</p>
    </div>
  </div>
</div>
