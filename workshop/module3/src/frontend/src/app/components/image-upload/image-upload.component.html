<div class="container mt-4" style="max-width: 600px;">
  <h2>Upload Image</h2>
  <div
    class="drop-zone border rounded p-5 text-center mb-3"
    [class.drag-over]="dragOver"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
  >
    <p>Drag &amp; drop an image here, or</p>
    <input type="file" accept="image/*" (change)="onFileSelect($event)" class="form-control" />
    <p *ngIf="selectedFile" class="mt-2 text-success">Selected: {{ selectedFile.name }}</p>
  </div>
  <div *ngIf="uploading" class="progress mb-3">
    <div
      class="progress-bar"
      role="progressbar"
      [style.width.%]="uploadProgress"
      [attr.aria-valuenow]="uploadProgress"
      aria-valuemin="0"
      aria-valuemax="100"
    >{{ uploadProgress }}%</div>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-primary" (click)="upload()" [disabled]="!selectedFile || uploading">Upload</button>
    <a routerLink="/images" class="btn btn-secondary">Cancel</a>
  </div>
</div>
